<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>⚽ WC2026 予想</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --green: #1D9E75;
  --green-dark: #0F6E56;
  --green-light: #E1F5EE;
  --blue: #185FA5;
  --blue-light: #E6F1FB;
  --amber: #BA7517;
  --amber-light: #FAEEDA;
  --red: #A32D2D;
  --red-light: #FCEBEB;
  --purple: #534AB7;
  --purple-light: #EEEDFE;
  --gray: #f5f5f3;
  --gray2: #e8e8e5;
  --text: #1a1a1a;
  --text2: #666;
  --text3: #999;
  --border: rgba(0,0,0,0.1);
  --white: #fff;
  --radius: 12px;
  --radius-sm: 8px;
  --shadow: 0 2px 12px rgba(0,0,0,0.08);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Hiragino Kaku Gothic ProN',sans-serif;background:var(--gray);color:var(--text);min-height:100vh;padding-bottom:80px}

/* ── Auth ── */
#auth-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;background:linear-gradient(135deg,#0F6E56 0%,#185FA5 100%)}
.auth-logo{font-size:56px;margin-bottom:12px}
.auth-title{font-size:24px;font-weight:700;color:#fff;margin-bottom:4px}
.auth-sub{font-size:14px;color:rgba(255,255,255,.7);margin-bottom:32px}
.auth-card{background:#fff;border-radius:var(--radius);padding:24px;width:100%;max-width:360px;box-shadow:var(--shadow)}
.auth-tabs{display:flex;gap:0;margin-bottom:20px;border:1px solid var(--border);border-radius:var(--radius-sm);overflow:hidden}
.auth-tab{flex:1;padding:10px;font-size:14px;font-weight:500;text-align:center;cursor:pointer;background:#fff;border:none;color:var(--text2);transition:.15s}
.auth-tab.active{background:var(--green);color:#fff}
.form-group{margin-bottom:14px}
.form-label{font-size:12px;color:var(--text2);margin-bottom:6px;display:block;font-weight:500}
.form-input{width:100%;height:44px;border:1px solid var(--border);border-radius:var(--radius-sm);padding:0 14px;font-size:15px;background:#fff;color:var(--text);outline:none;transition:.15s}
.form-input:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(29,158,117,.12)}
.btn{height:48px;border:none;border-radius:var(--radius-sm);font-size:15px;font-weight:600;cursor:pointer;transition:.15s;width:100%}
.btn-primary{background:var(--green);color:#fff}
.btn-primary:hover{background:var(--green-dark)}
.btn-primary:active{transform:scale(.98)}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border)}
.auth-error{font-size:12px;color:var(--red);margin-top:8px;text-align:center}

/* ── Header ── */
#app-screen{display:none}
.header{background:var(--green);color:#fff;padding:0 16px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.header-title{font-size:16px;font-weight:700}
.header-right{display:flex;align-items:center;gap:10px}
.avatar{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.25);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;cursor:pointer}

/* ── Bottom Nav ── */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--border);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 4px;cursor:pointer;border:none;background:none;color:var(--text3);font-size:10px;gap:3px;transition:.15s}
.nav-item.active{color:var(--green)}
.nav-icon{font-size:22px;line-height:1}

/* ── Content ── */
.content-wrapper{overflow:hidden;width:100%}
.content-slider{display:flex;transition:transform .3s cubic-bezier(.4,0,.2,1);will-change:transform}
.content{padding:16px;max-width:600px;margin:0 auto;min-width:100vw;width:100vw}
.section{display:block}

/* ── Cards ── */
.card{background:#fff;border-radius:var(--radius);padding:16px;margin-bottom:12px;box-shadow:var(--shadow)}
.card-title{font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.8px;margin-bottom:14px}

/* ── Group Tabs ── */
.group-scroll{display:flex;gap:6px;overflow-x:auto;margin-bottom:14px;padding-bottom:2px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.group-scroll::-webkit-scrollbar{display:none}
.gtab{flex-shrink:0;padding:6px 12px;font-size:13px;font-weight:600;border:1px solid var(--border);border-radius:20px;background:#fff;color:var(--text2);cursor:pointer;transition:.15s}
.gtab.active{background:var(--blue);border-color:var(--blue);color:#fff}

/* ── Match Row ── */
.match-row{padding:12px 0;border-bottom:1px solid var(--gray);display:flex;flex-direction:column;gap:8px}
.match-row:last-child{border-bottom:none}
.match-teams{display:flex;align-items:center;gap:6px;font-size:13px}
.team{flex:1;font-weight:500;color:var(--text)}
.team.right{text-align:right}
.vs{font-size:11px;color:var(--text3);background:var(--gray);padding:2px 6px;border-radius:4px;flex-shrink:0}
.pred-row{display:flex;gap:6px}
.pred-btn{flex:1;padding:7px 4px;font-size:12px;font-weight:500;border:1px solid var(--border);border-radius:8px;background:#fff;color:var(--text2);cursor:pointer;transition:.15s;text-align:center}
.pred-btn:active{transform:scale(.97)}
.pred-btn.sel-w{background:var(--green);border-color:var(--green);color:#fff}
.pred-btn.sel-d{background:var(--amber);border-color:var(--amber);color:#fff}
.pred-btn.sel-l{background:var(--red);border-color:var(--red);color:#fff}
.saved-dot{width:6px;height:6px;border-radius:50%;background:var(--green);display:inline-block;margin-left:4px;vertical-align:middle}

/* ── Champion Grid ── */
.champ-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.champ-btn{padding:10px 6px;border:1.5px solid var(--border);border-radius:var(--radius-sm);background:#fff;cursor:pointer;text-align:center;transition:.15s;display:flex;flex-direction:column;align-items:center;gap:4px}
.champ-btn:active{transform:scale(.96)}
.champ-btn .flag{font-size:22px}
.champ-btn .name{font-size:11px;font-weight:500;color:var(--text);line-height:1.2}
.champ-btn.selected{border-color:var(--purple);background:var(--purple-light)}
.champ-btn.selected .name{color:var(--purple)}

/* ── Odds ── */
.odds-item{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--gray)}
.odds-item:last-child{border-bottom:none}
.odds-team{font-size:14px;font-weight:500}
.odds-val{font-size:15px;font-weight:700;color:var(--green)}
.odds-bar{height:4px;background:var(--gray2);border-radius:2px;margin-top:4px;overflow:hidden}
.odds-fill{height:100%;border-radius:2px;background:var(--green)}

/* ── Ranking ── */
.rank-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--gray)}
.rank-row:last-child{border-bottom:none}
.rank-num{font-size:18px;min-width:28px;text-align:center}
.rank-avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0}
.rank-info{flex:1;min-width:0}
.rank-name{font-size:14px;font-weight:600;color:var(--text)}
.rank-sub{font-size:12px;color:var(--text2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rank-pts{font-size:18px;font-weight:700;color:var(--green);min-width:44px;text-align:right}

/* ── Badges ── */
.badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:600}
.badge-green{background:var(--green-light);color:var(--green-dark)}
.badge-amber{background:var(--amber-light);color:var(--amber)}
.badge-red{background:var(--red-light);color:var(--red)}
.badge-blue{background:var(--blue-light);color:var(--blue)}
.badge-admin{background:var(--amber-light);color:var(--amber);font-size:10px;padding:2px 6px;border-radius:4px}

/* ── Profile Menu ── */
.menu-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;display:none;align-items:flex-end}
.menu-overlay.show{display:flex}
.menu-sheet{background:#fff;border-radius:20px 20px 0 0;padding:20px;width:100%;max-width:600px;margin:0 auto}
.menu-item{display:flex;align-items:center;gap:12px;padding:14px 0;border-bottom:1px solid var(--gray);cursor:pointer;font-size:15px;color:var(--text)}
.menu-item:last-child{border-bottom:none}
.menu-item-icon{font-size:20px;width:32px;text-align:center}

/* ── Toast ── */
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(20px);background:#1a1a1a;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;opacity:0;transition:.25s;pointer-events:none;z-index:999;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── Loading ── */
.loading{display:flex;align-items:center;justify-content:center;padding:40px;color:var(--text3);font-size:14px;gap:8px}
.spinner{width:18px;height:18px;border:2px solid var(--gray2);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Misc ── */
.progress-bar{height:4px;background:var(--gray2);border-radius:2px;overflow:hidden;margin-top:6px}
.progress-fill{height:100%;border-radius:2px;background:var(--green);transition:width .3s}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.stat-row{display:flex;gap:8px;margin-bottom:14px}
.stat-box{flex:1;background:var(--gray);border-radius:var(--radius-sm);padding:10px;text-align:center}
.stat-val{font-size:20px;font-weight:700;color:var(--text)}
.stat-lab{font-size:11px;color:var(--text2);margin-top:2px}
.empty{text-align:center;padding:40px 20px;color:var(--text3);font-size:14px}
.result-btns{display:flex;gap:4px}
.result-btn{flex:1;padding:6px;font-size:11px;font-weight:500;border:1px solid var(--border);border-radius:6px;background:#fff;color:var(--text2);cursor:pointer;text-align:center}
.result-btn.sel-w{background:var(--green);border-color:var(--green);color:#fff}
.result-btn.sel-d{background:var(--amber);border-color:var(--amber);color:#fff}
.result-btn.sel-l{background:var(--red);border-color:var(--red);color:#fff}
.admin-note{background:var(--amber-light);border-radius:var(--radius-sm);padding:10px 12px;font-size:12px;color:var(--amber);margin-bottom:12px}
</style>
</head>

let resultGroup = 'A';

// ── Auth ──
sb.auth.onAuthStateChange(async (event, session) => {
  if (session) {
    currentUser = session.user;
    await loadProfile();
    showApp();
    await loadAll();
  } else {
    currentUser = null;
    showAuth();
  }
});

function switchAuthTab(tab) {
  document.querySelectorAll('.auth-tab').forEach((t,i)=>t.classList.toggle('active',i===(tab==='login'?0:1)));
  document.getElementById('login-form').style.display = tab==='login'?'':'none';
  document.getElementById('signup-form').style.display = tab==='signup'?'':'none';
}

async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pass = document.getElementById('login-pass').value;
  const btn = event.target;
  btn.textContent = '...';
  btn.disabled = true;
  const {data, error} = await sb.auth.signInWithPassword({email, password:pass});
  btn.textContent = 'ログイン';
  btn.disabled = false;
  if (error) {
    document.getElementById('login-error').textContent = 'メールアドレスまたはパスワードが正しくありません';
  } else if (data.session) {
    currentUser = data.session.user;
    await loadProfile();
    showApp();
    await loadAll();
  }
}

async function doSignup() {
  const name = document.getElementById('signup-name').value.trim();
  const email = document.getElementById('signup-email').value.trim();
  const pass = document.getElementById('signup-pass').value;
  if (!name) { document.getElementById('signup-error').textContent = '表示名を入力してください'; return; }
  if (pass.length < 6) { document.getElementById('signup-error').textContent = 'パスワードは6文字以上にしてください'; return; }
  const {error} = await sb.auth.signUp({email, password:pass, options:{data:{display_name:name}}});
  if (error) document.getElementById('signup-error').textContent = error.message;
  else showToast('確認メールを送信しました。メールを確認してください');
}

async function loadProfile() {
  const {data} = await sb.from('profiles').select('*').eq('id', currentUser.id).single();
  currentProfile = data;
  if (data) {
    const initials = data.display_name.slice(0,2);
    document.getElementById('user-avatar').textContent = initials;
    document.getElementById('menu-name').textContent = data.display_name + (data.is_admin?' 👑':'');
    document.getElementById('menu-email').textContent = currentUser.email;
    if (data.is_admin) document.getElementById('admin-result-section').style.display = 'block';
  }
}

async function logout() {
  await sb.auth.signOut();
  closeMenu({target:document.getElementById('menu-overlay')});
}

function showAuth() {
  document.getElementById('auth-screen').style.display = 'flex';
  document.getElementById('app-screen').style.display = 'none';
}
function showApp() {
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app-screen').style.display = 'block';
  // スライダー初期位置をリセット
  const slider = document.getElementById('content-slider');
  if (slider) slider.style.transform = 'translateX(0)';
  currentSectionIdx = 0;
  document.querySelectorAll('.nav-item').forEach((b,i) => b.classList.toggle('active', i===0));
  initSwipe();
}

// ── Data Loading ──
async function loadAll() {
  await Promise.all([loadMyPredictions(), loadAllProfiles(), loadAllPredictions(), loadResults(), loadChampPicks()]);
  renderScheduleGroupTabs();
  renderMatchList();
  renderOdds();
  renderRanking();
}

async function loadMyPredictions() {
  if (!currentUser) return;
  const {data} = await sb.from('predictions').select('match_id,result').eq('user_id', currentUser.id);
  myPredictions = {};
  (data||[]).forEach(p => myPredictions[p.match_id] = p.result);
  updatePredCount();
}

async function loadAllProfiles() {
  const {data} = await sb.from('profiles').select('*');
  allProfiles = data||[];
}

async function loadAllPredictions() {
  const {data} = await sb.from('predictions').select('*');
  allPredictions = data||[];
}

async function loadResults() {
  const {data} = await sb.from('match_results').select('*');
  allResults = {};
  (data||[]).forEach(r => allResults[r.match_id] = r.result);
}

async function loadChampPicks() {
  const {data} = await sb.from('champion_picks').select('*');
  champPicks = data||[];
}

function updatePredCount() {
  document.getElementById('pred-done').textContent = Object.values(myPredictions).filter(v=>v).length;
}

// ── Schedule ──
function renderScheduleGroupTabs() {
  const el = document.getElementById('schedule-group-tabs');
  el.innerHTML = Object.keys(GROUPS).map(g =>
    `<button class="gtab${g===scheduleGroup?' active':''}" onclick="setScheduleGroup('${g}')">${g}</button>`
  ).join('');
}

function setScheduleGroup(g) {
  scheduleGroup = g;
  renderScheduleGroupTabs();
  renderMatchList();
}

function renderMatchList() {
  const matches = ALL_MATCHES.filter(m => m.group === scheduleGroup);
  document.getElementById('match-list').innerHTML = matches.map(m => {
    const p = myPredictions[m.id]||'';
    const res = allResults[m.id]||'';
    const correct = res && p === res;
    const hf = FLAGS[m.home]||'';
    const af = FLAGS[m.away]||'';
    const resLabel = res==='W'?`${hf}勝`:res==='D'?'引分':res==='L'?`${af}勝`:'';
    return `<div class="match-row">
      <div class="match-teams">
        <span class="team right">${hf} ${m.home}</span>
        <span class="vs">vs</span>
        <span class="team">${af} ${m.away}</span>
        ${res ? `<span class="badge badge-${res==='W'?'green':res==='D'?'amber':'red'}" style="margin-left:auto;font-size:10px">${resLabel}${correct?' ✓':''}</span>` : ''}
      </div>
      <div class="pred-row">
        <button class="pred-btn${p==='W'?' sel-w':''}" onclick="setPred('${m.id}','W','${m.home}','${m.away}')">${hf} ${m.home}</button>
        <button class="pred-btn${p==='D'?' sel-d':''}" onclick="setPred('${m.id}','D','${m.home}','${m.away}')">🤝 引き分け</button>
        <button class="pred-btn${p==='L'?' sel-l':''}" onclick="setPred('${m.id}','L','${m.home}','${m.away}')">${af} ${m.away}</button>
      </div>
    </div>`;
  }).join('');
}

async function setPred(matchId, result, home, away) {
  if (!currentUser) return;
  const prev = myPredictions[matchId];
  // 同じボタンをもう一度タップしたら解除
  if (prev === result) {
    delete myPredictions[matchId];
    renderMatchList();
    updatePredCount();
    await sb.from('predictions').delete().match({user_id:currentUser.id, match_id:matchId});
    await loadAllPredictions();
    showToast('予想を解除しました');
    return;
  }
  myPredictions[matchId] = result;
  renderMatchList();
  updatePredCount();
  if (prev) {
    await sb.from('predictions').update({result}).match({user_id:currentUser.id, match_id:matchId});
  } else {
    await sb.from('predictions').insert({user_id:currentUser.id, match_id:matchId, result});
  }
  await loadAllPredictions();
  showToast('予想を保存しました ✓');
}

// ── Champion ──
function renderChampion() {
  const allTeams = Object.values(GROUPS).flat();
  const myPick = champPicks.find(c => c.user_id === currentUser?.id)?.team_name || '';
  document.getElementById('champ-grid').innerHTML = allTeams.map(t =>
    `<button class="champ-btn${myPick===t?' selected':''}" onclick="setChampPick('${t}')">
      <span class="flag">${FLAGS[t]||'🏳'}</span>
      <span class="name">${t}</span>
    </button>`
  ).join('');

  const counts = {};
  allTeams.forEach(t => counts[t] = 0);
  champPicks.forEach(c => { if(c.team_name) counts[c.team_name] = (counts[c.team_name]||0)+1; });
  const total = champPicks.length;
  const sorted = Object.entries(counts).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]);

  if (sorted.length === 0) {
    document.getElementById('champ-summary').innerHTML = '<div class="empty">まだ誰も予想していません</div>';
    return;
  }
  document.getElementById('champ-summary').innerHTML = sorted.map(([t,c]) => {
    const pct = Math.round(c/total*100);
    const user = allProfiles.find(p => champPicks.find(cp=>cp.team_name===t&&cp.user_id===p.id));
    return `<div class="odds-item">
      <div style="flex:1">
        <div class="odds-team">${FLAGS[t]||''} ${t}</div>
        <div style="font-size:12px;color:var(--text3)">${c}票 (${pct}%)</div>
        <div class="odds-bar"><div class="odds-fill" style="width:${pct}%"></div></div>
      </div>
    </div>`;
  }).join('');
}

async function setChampPick(team) {
  if (!currentUser) return;
  const existing = champPicks.find(c => c.user_id === currentUser.id);
  if (existing) {
    await sb.from('champion_picks').update({team_name:team}).eq('user_id', currentUser.id);
  } else {
    await sb.from('champion_picks').insert({user_id:currentUser.id, team_name:team});
  }
  await loadChampPicks();
  renderChampion();
  showToast(`${FLAGS[team]||''} ${team} を優勝予想に設定しました`);
}

// ── Odds ──
function renderOdds() {
  const counts = {};
  const allTeams = Object.values(GROUPS).flat();
  allTeams.forEach(t => counts[t] = 0);
  champPicks.forEach(c => { if(c.team_name) counts[c.team_name]=(counts[c.team_name]||0)+1; });
  const total = champPicks.length;

  const sorted = allTeams
    .filter(t => BASE_ODDS[t])
    .map(t => {
      let odds = BASE_ODDS[t]||99;
      if (total > 2 && counts[t] > 0) odds = Math.max(1.5, odds * (1 - counts[t]/total * 0.5));
      return {t, odds};
    })
    .sort((a,b) => a.odds - b.odds)
    .slice(0, 16);

  document.getElementById('odds-list').innerHTML = sorted.map(({t, odds}) =>
    `<div class="odds-item">
      <div class="odds-team">${FLAGS[t]||''} ${t}</div>
      <div class="odds-val">${odds.toFixed(1)}倍</div>
    </div>`
  ).join('');

  renderOddsGroupTabs();
  renderOddsMatches();
}

function renderOddsGroupTabs() {
  const el = document.getElementById('odds-group-tabs');
  el.innerHTML = Object.keys(GROUPS).map(g =>
    `<button class="gtab${g===oddsGroup?' active':''}" onclick="setOddsGroup('${g}')">${g}</button>`
  ).join('');
}

function setOddsGroup(g) { oddsGroup=g; renderOddsGroupTabs(); renderOddsMatches(); }

function renderOddsMatches() {
  const matches = ALL_MATCHES.filter(m => m.group === oddsGroup);
  if (allProfiles.length === 0) {
    document.getElementById('odds-matches').innerHTML = '<div class="empty">参加者が予想すると表示されます</div>';
    return;
  }
  document.getElementById('odds-matches').innerHTML = matches.map(m => {
    const preds = allPredictions.filter(p => p.match_id === m.id);
    const wins = preds.filter(p=>p.result==='W').length;
    const draws = preds.filter(p=>p.result==='D').length;
    const losses = preds.filter(p=>p.result==='L').length;
    const total = wins+draws+losses;
    if (total === 0) return `<div class="match-row"><div style="font-size:13px;color:var(--text3)">${FLAGS[m.home]||''} ${m.home} vs ${FLAGS[m.away]||''} ${m.away} — 予想なし</div></div>`;
    const wo = (total/Math.max(wins,0.5)).toFixed(1);
    const do2 = (total/Math.max(draws,0.5)).toFixed(1);
    const lo = (total/Math.max(losses,0.5)).toFixed(1);
    return `<div class="match-row">
      <div style="font-size:13px;font-weight:500;margin-bottom:4px">${FLAGS[m.home]||''} ${m.home} vs ${FLAGS[m.away]||''} ${m.away}</div>
      <div style="display:flex;gap:6px;font-size:12px;color:var(--text2);margin-bottom:6px">${wins}票 / ${draws}票 / ${losses}票</div>
      <div style="display:flex;gap:6px">
        <span class="badge badge-green">H ${wo}倍</span>
        <span class="badge badge-amber">引 ${do2}倍</span>
        <span class="badge badge-red">A ${lo}倍</span>
      </div>
    </div>`;
  }).join('');
}

// ── Ranking ──
function renderRanking() {
  const scores = allProfiles.map((p, i) => {
    const preds = allPredictions.filter(pr => pr.user_id === p.id);
    let pts = 0;
    preds.forEach(pr => { if(allResults[pr.match_id] && allResults[pr.match_id]===pr.result) pts+=3; });
    const champPick = champPicks.find(c=>c.user_id===p.id);
    const champCorrect = false; // 優勝確定後に実装
    if (champCorrect) pts += 10;
    const totalPreds = preds.length;
    const pct = Math.round(totalPreds/72*100);
    const col = AVATARS[i%AVATARS.length];
    return {name:p.display_name, pts, preds:totalPreds, pct, col, isAdmin:p.is_admin, champ:champPick?.team_name||''};
  }).sort((a,b) => b.pts-a.pts || b.preds-a.preds);

  if (scores.length === 0) {
    document.getElementById('ranking-list').innerHTML = '<div class="empty">まだ誰も登録していません</div>';
    return;
  }
  document.getElementById('ranking-list').innerHTML = scores.map((u,i) =>
    `<div class="rank-row">
      <div class="rank-num">${['🥇','🥈','🥉'][i]||i+1}</div>
      <div class="rank-avatar" style="background:${u.col}22;color:${u.col}">${u.name.slice(0,2)}</div>
      <div class="rank-info">
        <div class="rank-name">${u.name}${u.isAdmin?' 👑':''}</div>
        <div class="rank-sub">${FLAGS[u.champ]||''} ${u.champ||'優勝未予想'} | ${u.preds}試合予想済</div>
        <div class="progress-bar"><div class="progress-fill" style="width:${u.pct}%;background:${u.col}"></div></div>
      </div>
      <div class="rank-pts">${u.pts}pt</div>
    </div>`
  ).join('');

  if (currentProfile?.is_admin) renderResultSection();
}

function renderResultSection() {
  const el = document.getElementById('result-group-tabs');
  el.innerHTML = Object.keys(GROUPS).map(g =>
    `<button class="gtab${g===resultGroup?' active':''}" onclick="setResultGroup('${g}')">${g}</button>`
  ).join('');
  renderResultMatches();
}

function setResultGroup(g) { resultGroup=g; renderResultSection(); }

function renderResultMatches() {
  const matches = ALL_MATCHES.filter(m => m.group === resultGroup);
  document.getElementById('result-match-list').innerHTML = matches.map(m => {
    const r = allResults[m.id]||'';
    return `<div class="match-row">
      <div style="font-size:13px;font-weight:500;margin-bottom:6px">${FLAGS[m.home]||''} ${m.home} vs ${FLAGS[m.away]||''} ${m.away}</div>
      <div class="result-btns">
        <button class="result-btn${r==='W'?' sel-w':''}" onclick="setResult('${m.id}','W')">H勝ち</button>
        <button class="result-btn${r==='D'?' sel-d':''}" onclick="setResult('${m.id}','D')">引分</button>
        <button class="result-btn${r==='L'?' sel-l':''}" onclick="setResult('${m.id}','L')">A勝ち</button>
      </div>
    </div>`;
  }).join('');
}

async function setResult(matchId, result) {
  if (!currentProfile?.is_admin) return;
  if (allResults[matchId]) {
    await sb.from('match_results').update({result}).eq('match_id', matchId);
  } else {
    await sb.from('match_results').insert({match_id:matchId, result, entered_by:currentUser.id});
  }
  await loadResults();
  renderResultMatches();
  renderRanking();
  renderMatchList();
  showToast('結果を記録しました ✓');
}

// ── Navigation ──
const SECTIONS = ['schedule','champion','odds','ranking'];
let currentSectionIdx = 0;

function showSection(name, btn) {
  const idx = SECTIONS.indexOf(name);
  if (idx === -1) return;
  currentSectionIdx = idx;
  document.getElementById('content-slider').style.transform = `translateX(-${idx * 100}vw)`;
  document.querySelectorAll('.nav-item').forEach((b,i) => b.classList.toggle('active', i===idx));
  if (name==='champion') { renderChampion(); }
  if (name==='odds') { renderOdds(); }
  if (name==='ranking') { renderRanking(); }
}

// スワイプ操作
function initSwipe() {
  const slider = document.getElementById('content-slider');
  if (!slider || slider._swipeInit) return;
  slider._swipeInit = true;
  let startX = 0, startY = 0, isDragging = false;
  function onStart(e) {
    const t = e.touches ? e.touches[0] : e;
    startX = t.clientX; startY = t.clientY; isDragging = true;
  }
  function onEnd(e) {
    if (!isDragging) return;
    isDragging = false;
    const t = e.changedTouches ? e.changedTouches[0] : e;
    const dx = t.clientX - startX;
    const dy = t.clientY - startY;
    if (Math.abs(dx) < Math.abs(dy) || Math.abs(dx) < 50) return;
    if (dx < 0 && currentSectionIdx < SECTIONS.length - 1) {
      showSection(SECTIONS[currentSectionIdx + 1], document.querySelectorAll('.nav-item')[currentSectionIdx + 1]);
    } else if (dx > 0 && currentSectionIdx > 0) {
      showSection(SECTIONS[currentSectionIdx - 1], document.querySelectorAll('.nav-item')[currentSectionIdx - 1]);
    }
  }
  slider.addEventListener('touchstart', onStart, {passive:true});
  slider.addEventListener('touchend', onEnd, {passive:true});
}

function openMenu() { document.getElementById('menu-overlay').classList.add('show'); }
function closeMenu(e) { if(e.target===document.getElementById('menu-overlay')) document.getElementById('menu-overlay').classList.remove('show'); }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2500);
}
</script>
