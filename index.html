<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="WC2026予想">
<meta name="theme-color" content="#1565C0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<title>⚽ WC2026 予想</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg:#0f1f35;--bg2:#162640;--bg3:#1e3050;
  --blue:#1565C0;--blue2:#1976D2;--blue3:#42a5f5;
  --red:#e53935;--red2:#c62828;
  --green2:#2e7d32;--green3:#4caf50;--green4:#81c784;
  --amber:#fb8c00;--amber2:#ffcc02;
  --purple:#7c4dff;--purple2:#ce93d8;
  --text:#fff;--text2:rgba(255,255,255,.7);--text3:rgba(255,255,255,.4);
  --border:rgba(255,255,255,.1);--border2:rgba(255,255,255,.18);
  --radius:14px;--radius-sm:10px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow-x:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans',sans-serif;background:var(--bg);color:var(--text);padding-bottom:calc(58px + env(safe-area-inset-bottom))}

/* AUTH */
#auth-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;height:100dvh;padding:24px;overflow:hidden;background:linear-gradient(160deg,#0d2240 0%,#1a4a8a 45%,#c62828 100%);position:relative}
.auth-star{position:absolute;background:#fff;border-radius:50%;opacity:.7}
.auth-stripe{position:absolute;bottom:0;left:0;right:0;height:5px;display:flex}
.auth-stripe div{flex:1}
.auth-logo{width:88px;height:88px;border-radius:50%;background:rgba(255,255,255,.15);border:2.5px solid rgba(255,255,255,.45);display:flex;align-items:center;justify-content:center;font-size:46px;margin-bottom:14px;position:relative;z-index:1}
.auth-title{font-size:26px;font-weight:800;color:#fff;letter-spacing:1.5px;margin-bottom:5px;position:relative;z-index:1}
.auth-sub{font-size:13px;color:rgba(255,255,255,.75);margin-bottom:28px;letter-spacing:.5px;position:relative;z-index:1}
.auth-card{background:rgba(255,255,255,.13);border:1px solid rgba(255,255,255,.25);border-radius:18px;padding:22px;width:100%;max-width:360px;position:relative;z-index:1}
.auth-tabs{display:flex;background:rgba(0,0,0,.25);border-radius:10px;padding:3px;margin-bottom:16px}
.auth-tab{flex:1;padding:8px;font-size:13px;font-weight:700;text-align:center;color:rgba(255,255,255,.45);border-radius:8px;cursor:pointer;border:none;background:none;transition:.15s}
.auth-tab.active{background:linear-gradient(135deg,#e53935,#c62828);color:#fff}
.form-group{margin-bottom:12px}
.form-label{font-size:11px;color:rgba(255,255,255,.6);margin-bottom:5px;display:block;font-weight:600;letter-spacing:.5px}
.form-input{width:100%;height:44px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);border-radius:10px;padding:0 14px;font-size:15px;color:#fff;outline:none;transition:.15s}
.form-input::placeholder{color:rgba(255,255,255,.35)}
.form-input:focus{border-color:rgba(255,255,255,.55);background:rgba(255,255,255,.18)}
.btn{height:48px;border:none;border-radius:12px;font-size:15px;font-weight:800;cursor:pointer;width:100%;letter-spacing:.5px;transition:.15s}
.btn-primary{background:linear-gradient(135deg,#e53935,#c62828);color:#fff}
.btn-primary:active{transform:scale(.97)}
.auth-error{font-size:12px;color:#ff8a80;margin-top:8px;text-align:center}

/* HEADER */
#app-screen{display:none}
.header{background:linear-gradient(135deg,#1565C0,#1976D2);color:#fff;padding:0 16px;height:54px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.header-title{font-size:16px;font-weight:800;letter-spacing:.5px;display:flex;align-items:center;gap:8px}
.avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#e53935,#c62828);border:2px solid rgba(255,255,255,.4);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;cursor:pointer}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#0a1628;border-top:1px solid var(--border);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:7px 2px;cursor:pointer;border:none;background:none;color:var(--text3);font-size:9px;gap:2px;transition:.15s}
.nav-item.active{color:var(--blue3)}
.nav-icon{font-size:20px;line-height:1}

/* CONTENT SLIDER */
.content-wrapper{overflow:hidden;width:100%}
.content-slider{display:flex;transition:transform .3s cubic-bezier(.4,0,.2,1);will-change:transform}
.content{padding:12px;padding-bottom:8px;min-width:100vw;width:100vw}

/* CARDS */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px}
.card:last-child{margin-bottom:0}
.card-title{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px}

/* GROUP TABS */
.group-scroll{display:flex;gap:5px;overflow-x:auto;margin-bottom:12px;padding-bottom:2px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.group-scroll::-webkit-scrollbar{display:none}
.gtab{flex-shrink:0;padding:5px 12px;font-size:12px;font-weight:700;border:1px solid var(--border);border-radius:20px;background:transparent;color:var(--text3);cursor:pointer;transition:.15s}
.gtab.active{background:linear-gradient(135deg,#1976D2,#1565C0);border-color:#1976D2;color:#fff}

/* MATCH ROW */
.match-row{padding:10px 0;border-bottom:1px solid rgba(255,255,255,.06);display:flex;flex-direction:column;gap:7px}
.match-row:last-child{border-bottom:none;padding-bottom:0}
.match-header{display:flex;align-items:center;gap:6px;font-size:13px}
.team{flex:1;font-weight:600;color:var(--text)}
.team.right{text-align:right}
.score-badge{background:rgba(255,255,255,.08);border:1px solid var(--border);border-radius:6px;padding:3px 8px;font-size:12px;font-weight:700;color:var(--text);flex-shrink:0;min-width:48px;text-align:center}
.score-badge.upcoming{background:transparent;border-color:var(--border);color:var(--text3);font-size:10px}
.pred-row{display:flex;gap:5px}
.pred-btn{flex:1;padding:7px 3px;font-size:11px;font-weight:600;border:1px solid var(--border);border-radius:8px;background:rgba(255,255,255,.05);color:var(--text2);cursor:pointer;transition:.15s;text-align:center}
.pred-btn:active{transform:scale(.96)}
.pred-btn.sel-w{background:rgba(46,125,50,.5);border-color:var(--green3);color:var(--green4)}
.pred-btn.sel-d{background:rgba(245,124,0,.3);border-color:var(--amber);color:var(--amber2)}
.pred-btn.sel-l{background:rgba(229,57,53,.35);border-color:var(--red);color:#ff8a80}
.correct-mark{color:var(--green4);font-size:11px;margin-left:2px}

/* CHAMPION */
.champ-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
.champ-btn{padding:10px 5px;border:1px solid var(--border);border-radius:var(--radius-sm);background:rgba(255,255,255,.04);cursor:pointer;text-align:center;transition:.15s;display:flex;flex-direction:column;align-items:center;gap:3px}
.champ-btn:active{transform:scale(.95)}
.champ-btn .flag{font-size:22px}
.champ-btn .name{font-size:10px;font-weight:600;color:var(--text2);line-height:1.2}
.champ-btn.selected{border-color:var(--purple);background:rgba(124,77,255,.2)}
.champ-btn.selected .name{color:var(--purple2)}

/* GROUP ADVANCE */
.group-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:12px;margin-bottom:8px}
.group-card-title{font-size:11px;font-weight:700;color:var(--blue3);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.team-pick-row{display:flex;gap:6px;flex-wrap:wrap}
.team-pick-btn{flex:1;min-width:calc(50% - 3px);padding:7px 4px;font-size:11px;font-weight:600;border:1px solid var(--border);border-radius:8px;background:rgba(255,255,255,.04);color:var(--text2);cursor:pointer;text-align:center;transition:.15s}
.team-pick-btn.sel1{background:rgba(21,101,192,.4);border-color:var(--blue2);color:var(--blue3)}
.team-pick-btn.sel2{background:rgba(46,125,50,.4);border-color:var(--green3);color:var(--green4)}

/* KNOCKOUT */
.ko-round-title{font-size:12px;font-weight:700;color:var(--amber2);margin:14px 0 8px;display:flex;align-items:center;gap:6px}
.ko-match{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px;margin-bottom:8px}
.ko-pick-row{display:flex;gap:6px;margin-top:7px}
.ko-btn{flex:1;padding:7px 4px;font-size:11px;font-weight:600;border:1px solid var(--border);border-radius:8px;background:rgba(255,255,255,.04);color:var(--text2);cursor:pointer;text-align:center;transition:.15s}
.ko-btn.selected{background:rgba(245,124,0,.3);border-color:var(--amber);color:var(--amber2)}
.ko-tbd{font-size:11px;color:var(--text3);padding:6px;text-align:center;border:1px dashed var(--border);border-radius:8px}

/* SCORER */
.scorer-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:7px;margin-top:4px}
.scorer-btn{padding:10px 6px;border:1px solid var(--border);border-radius:var(--radius-sm);background:rgba(255,255,255,.04);cursor:pointer;text-align:center;transition:.15s;display:flex;flex-direction:column;align-items:center;gap:3px}
.scorer-btn:active{transform:scale(.95)}
.scorer-btn .s-flag{font-size:18px}
.scorer-btn .s-name{font-size:11px;font-weight:700;color:var(--text)}
.scorer-btn .s-team{font-size:10px;color:var(--text3)}
.scorer-btn.selected{border-color:var(--amber);background:rgba(245,124,0,.2)}
.scorer-btn.selected .s-name{color:var(--amber2)}

/* ODDS */
.odds-item{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.06)}
.odds-item:last-child{border-bottom:none}
.odds-team{font-size:14px;font-weight:600;color:var(--text)}
.odds-val{font-size:15px;font-weight:800;color:var(--blue3)}
.odds-bar{height:3px;background:rgba(255,255,255,.1);border-radius:2px;margin-top:4px;overflow:hidden}
.odds-fill{height:100%;border-radius:2px;background:var(--blue2)}

/* RANKING */
.rank-row{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid rgba(255,255,255,.06)}
.rank-row:last-child{border-bottom:none}
.rank-num{font-size:18px;min-width:28px;text-align:center}
.rank-avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.rank-info{flex:1;min-width:0}
.rank-name{font-size:14px;font-weight:700;color:var(--text)}
.rank-sub{font-size:11px;color:var(--text3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rank-pts{font-size:18px;font-weight:800;color:var(--blue3);min-width:44px;text-align:right}

/* BADGES */
.badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:600}
.badge-green{background:rgba(46,125,50,.3);color:var(--green4)}
.badge-amber{background:rgba(245,124,0,.25);color:var(--amber2)}
.badge-red{background:rgba(229,57,53,.25);color:#ff8a80}
.badge-blue{background:rgba(21,101,192,.3);color:var(--blue3)}
.badge-admin{background:rgba(245,124,0,.25);color:var(--amber2);font-size:10px;padding:2px 6px;border-radius:4px}

/* RESULT */
.result-btns{display:flex;gap:4px}
.result-btn{flex:1;padding:6px;font-size:10px;font-weight:600;border:1px solid var(--border);border-radius:6px;background:rgba(255,255,255,.04);color:var(--text3);cursor:pointer;text-align:center;transition:.15s}
.result-btn.sel-w{background:rgba(46,125,50,.4);border-color:var(--green3);color:var(--green4)}
.result-btn.sel-d{background:rgba(245,124,0,.3);border-color:var(--amber);color:var(--amber2)}
.result-btn.sel-l{background:rgba(229,57,53,.35);border-color:var(--red);color:#ff8a80}
.score-input-row{display:flex;align-items:center;gap:6px;margin-top:8px}
.score-input{width:44px;height:36px;background:rgba(255,255,255,.1);border:1px solid var(--border2);border-radius:8px;color:#fff;font-size:16px;font-weight:700;text-align:center;outline:none}
.score-dash{color:var(--text3);font-size:14px;font-weight:700}
.score-save-btn{flex:1;height:36px;background:linear-gradient(135deg,#1976D2,#1565C0);border:none;border-radius:8px;color:#fff;font-size:12px;font-weight:700;cursor:pointer}

/* MISC */
.progress-bar{height:4px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden;margin-top:5px}
.progress-fill{height:100%;border-radius:2px;transition:width .3s}
.stat-row{display:flex;gap:8px;margin-bottom:12px}
.stat-box{flex:1;background:rgba(255,255,255,.06);border-radius:var(--radius-sm);padding:10px;text-align:center}
.stat-val{font-size:20px;font-weight:800;color:var(--text)}
.stat-lab{font-size:10px;color:var(--text3);margin-top:2px}
.empty{text-align:center;padding:32px 20px;color:var(--text3);font-size:14px}
.admin-note{background:rgba(245,124,0,.15);border:1px solid rgba(245,124,0,.3);border-radius:var(--radius-sm);padding:10px 12px;font-size:12px;color:var(--amber2);margin-bottom:12px}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.menu-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:none;align-items:flex-end}
.menu-overlay.show{display:flex}
.menu-sheet{background:#162640;border:1px solid var(--border);border-radius:20px 20px 0 0;padding:20px;width:100%;max-width:600px;margin:0 auto}
.menu-item{display:flex;align-items:center;gap:12px;padding:14px 0;border-bottom:1px solid rgba(255,255,255,.06);cursor:pointer;font-size:15px;color:var(--text)}
.menu-item:last-child{border-bottom:none}
.menu-item-icon{font-size:20px;width:32px;text-align:center}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(22,38,64,.95);border:1px solid var(--border2);color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;opacity:0;transition:.25s;pointer-events:none;z-index:999;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.loading{display:flex;align-items:center;justify-content:center;padding:40px;color:var(--text3);font-size:14px;gap:8px}
.spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,.1);border-top-color:var(--blue3);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.tab-scroll{display:flex;gap:5px;overflow-x:auto;margin-bottom:14px;padding-bottom:2px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.tab-scroll::-webkit-scrollbar{display:none}
.stab{flex-shrink:0;padding:6px 14px;font-size:12px;font-weight:700;border:1px solid var(--border);border-radius:20px;background:transparent;color:var(--text3);cursor:pointer;transition:.15s}
.stab.active{background:linear-gradient(135deg,#e53935,#c62828);border-color:#e53935;color:#fff}
</style>
</head>
<body>

<div id="auth-screen">
  <div class="auth-star" style="width:2px;height:2px;top:7%;left:18%"></div>
  <div class="auth-star" style="width:1px;height:1px;top:14%;left:72%"></div>
  <div class="auth-star" style="width:2px;height:2px;top:22%;left:48%"></div>
  <div class="auth-star" style="width:1px;height:1px;top:6%;left:88%"></div>
  <div class="auth-star" style="width:2px;height:2px;top:32%;left:10%"></div>
  <div class="auth-star" style="width:3px;height:3px;top:10%;left:35%;opacity:.4"></div>
  <div class="auth-logo">⚽</div>
  <div class="auth-title">WC 2026</div>
  <div class="auth-sub">🏆定例会🏆 予想アプリ</div>
  <div class="auth-card">
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchAuthTab('login')">ログイン</button>
      <button class="auth-tab" onclick="switchAuthTab('signup')">新規登録</button>
    </div>
    <div id="login-form">
      <div class="form-group"><label class="form-label">メールアドレス</label><input type="email" class="form-input" id="login-email" placeholder="example@email.com"></div>
      <div class="form-group"><label class="form-label">パスワード</label><input type="password" class="form-input" id="login-pass" placeholder="••••••••"></div>
      <button class="btn btn-primary" onclick="doLogin()">ログイン</button>
      <div class="auth-error" id="login-error"></div>
    </div>
    <div id="signup-form" style="display:none">
      <div class="form-group"><label class="form-label">表示名</label><input type="text" class="form-input" id="signup-name" placeholder="例：田中"></div>
      <div class="form-group"><label class="form-label">メールアドレス</label><input type="email" class="form-input" id="signup-email" placeholder="example@email.com"></div>
      <div class="form-group"><label class="form-label">パスワード（6文字以上）</label><input type="password" class="form-input" id="signup-pass" placeholder="••••••••"></div>
      <button class="btn btn-primary" onclick="doSignup()">登録する</button>
      <div class="auth-error" id="signup-error"></div>
    </div>
  </div>
  <div class="auth-stripe"><div style="background:#1565C0"></div><div style="background:#e53935"></div><div style="background:#2e7d32"></div></div>
</div>

<div id="app-screen">
  <div class="header">
    <div class="header-title">⚽ WC2026 予想</div>
    <div class="avatar" id="user-avatar" onclick="openMenu()">?</div>
  </div>

  <div class="content-wrapper">
  <div class="content-slider" id="content-slider">

    <!-- 日程・予想 -->
    <div class="content" id="sec-schedule">
      <div class="card">
        <div class="section-header">
          <div class="card-title" style="margin:0">グループステージ予想</div>
          <div style="display:flex;gap:6px">
            <div class="stat-box" style="padding:5px 10px"><div class="stat-val" id="pred-done" style="font-size:16px">0</div><div class="stat-lab">予想済</div></div>
            <div class="stat-box" style="padding:5px 10px"><div class="stat-val" style="font-size:16px">72</div><div class="stat-lab">総試合</div></div>
          </div>
        </div>
      </div>
      <div class="card" style="padding-bottom:4px">
        <div class="group-scroll" id="schedule-group-tabs"></div>
        <div id="match-list"><div class="loading"><div class="spinner"></div>読み込み中...</div></div>
      </div>
    </div>

    <!-- 予想メニュー -->
    <div class="content" id="sec-predict">
      <div class="tab-scroll" id="predict-tabs">
        <button class="stab active" onclick="setPredictTab('champion',this)">🏆 優勝</button>
        <button class="stab" onclick="setPredictTab('group',this)">📋 突破</button>
        <button class="stab" onclick="setPredictTab('knockout',this)">⚡ KO</button>
        <button class="stab" onclick="setPredictTab('scorer',this)">⚽ 得点王</button>
      </div>
      <div id="predict-champion">
        <div class="card"><div class="card-title">あなたの優勝予想</div><div class="champ-grid" id="champ-grid"></div></div>
        <div class="card"><div class="card-title">みんなの優勝予想</div><div id="champ-summary"></div></div>
      </div>
      <div id="predict-group" style="display:none">
        <div class="card" style="margin-bottom:6px"><div style="font-size:12px;color:var(--text2)">各グループから突破する2チームを選んでください</div></div>
        <div id="group-advance-list"></div>
      </div>
      <div id="predict-knockout" style="display:none">
        <div class="card" style="margin-bottom:6px"><div style="font-size:12px;color:var(--text2)">グループ突破チーム予想後に解放されます。各試合の勝者を予想してください。</div></div>
        <div id="knockout-list"></div>
      </div>
      <div id="predict-scorer" style="display:none">
        <div class="card"><div class="card-title">得点王を予想する</div><div class="scorer-grid" id="scorer-grid"></div></div>
        <div class="card"><div class="card-title">みんなの得点王予想</div><div id="scorer-summary"></div></div>
      </div>
    </div>

    <!-- オッズ -->

function renderChampion(){
  const allTeams=Object.values(GROUPS).flat();

  document.getElementById('champ-grid').innerHTML=allTeams.map(t=>`<button class="champ-btn${myPick===t?' selected':''}" onclick="setChampPick('${t}')"><span class="flag">${FLAGS[t]||'🏳'}</span><span class="name">${t}</span></button>`).join('');
  const counts={};allTeams.forEach(t=>counts[t]=0);
  champPicks.filter(c=>c.team_name).forEach(c=>{counts[c.team_name]=(counts[c.team_name]||0)+1;});
  const total=champPicks.filter(c=>c.team_name).length;

}

async function toggleGroupPick(group,team){
  if(!currentUser)return;
  const myPick=groupAdvancePicks.find(p=>p.user_id===currentUser.id&&p.group_name===group);
  let t1=myPick?.team1||'',t2=myPick?.team2||'';
  if(t1===team){t1=t2;t2='';}
  else if(t2===team){t2='';}
  else if(!t1){t1=team;}
  else if(!t2){t2=team;}
  else{t1=t2;t2=team;}
  if(t1||t2){
    if(myPick)await sb.from('group_advance_picks').update({team1:t1,team2:t2}).match({user_id:currentUser.id,group_name:group});
    else await sb.from('group_advance_picks').insert({user_id:currentUser.id,group_name:group,team1:t1,team2:t2});

// KNOCKOUT
function renderKnockout(){
  const myPicks=knockoutPicks.filter(p=>p.user_id===currentUser?.id);
  const myAdvance=groupAdvancePicks.filter(p=>p.user_id===currentUser?.id);
  const advanceCount=myAdvance.filter(p=>p.team1&&p.team2).length;
  if(advanceCount<12){
    document.getElementById('knockout-list').innerHTML=`<div class="card"><div style="text-align:center;padding:20px;color:var(--text3)"><div style="font-size:32px;margin-bottom:8px">🔒</div><div style="font-size:13px">グループ突破予想を全グループ完了させると解放されます</div><div style="font-size:12px;color:var(--blue3);margin-top:8px">${advanceCount}/12 完了</div></div></div>`;
    return;
  }
  const allAdvanced=[];Object.keys(GROUPS).forEach(g=>{
    const p=myAdvance.find(x=>x.group_name===g);
    if(p){allAdvanced.push({team:p.team1,group:g,pos:1});allAdvanced.push({team:p.team2,group:g,pos:2});}
  });
  let html='';
  KO_ROUNDS.forEach(round=>{
    html+=`<div class="ko-round-title">⚡ ${round.label}</div>`;
    for(let i=0;i<round.matches;i++){
      const mid=`${round.id}_${i}`;
      const pick=myPicks.find(p=>p.round===round.id&&p.match_id===mid);
      let teamA='?',teamB='?';
      if(round.id==='r32'){
        teamA=allAdvanced[i*2]?.team||'?';teamB=allAdvanced[i*2+1]?.team||'?';
      }
      const fa=FLAGS[teamA]||'';const fb=FLAGS[teamB]||'';
      if(teamA==='?'||teamB==='?'){
        html+=`<div class="ko-match"><div style="font-size:12px;color:var(--text3)">試合 ${i+1}</div><div class="ko-tbd">前ラウンドの結果待ち</div></div>`;
      } else {
        html+=`<div class="ko-match"><div style="font-size:12px;font-weight:600;color:var(--text2);margin-bottom:4px">${fa} ${teamA} vs ${fb} ${teamB}</div><div class="ko-pick-row"><button class="ko-btn${pick?.winner===teamA?' selected':''}" onclick="setKoPick('${round.id}','${mid}','${teamA}')">${fa} ${teamA}</button><button class="ko-btn${pick?.winner===teamB?' selected':''}" onclick="setKoPick('${round.id}','${mid}','${teamB}')">${fb} ${teamB}</button></div></div>`;
      }
    }
  });
  document.getElementById('knockout-list').innerHTML=html;
}
async function setKoPick(round,matchId,winner){
  if(!currentUser)return;
  const ex=knockoutPicks.find(p=>p.user_id===currentUser.id&&p.round===round&&p.match_id===matchId);
  if(ex){
    if(ex.winner===winner){await sb.from('knockout_picks').delete().match({user_id:currentUser.id,round,match_id:matchId});await loadKnockoutPicks();renderKnockout();showToast('予想を解除しました');return;}
    await sb.from('knockout_picks').update({winner}).match({user_id:currentUser.id,round,match_id:matchId});
  } else await sb.from('knockout_picks').insert({user_id:currentUser.id,round,match_id:matchId,winner});
  await loadKnockoutPicks();renderKnockout();showToast(`${FLAGS[winner]||''} ${winner} を予想しました`);
}

// SCORER
function renderScorer(){
  const myPick=scorerPicks.find(p=>p.user_id===currentUser?.id&&p.player_name);
  document.getElementById('scorer-grid').innerHTML=TOP_SCORERS.map(s=>`<button class="scorer-btn${myPick?.player_name===s.name?' selected':''}" onclick="setScorerPick('${s.name}','${s.team}')"><span class="s-flag">${s.flag}</span><span class="s-name">${s.name}</span><span class="s-team">${s.team}</span></button>`).join('');
  const counts={};TOP_SCORERS.forEach(s=>counts[s.name]=0);
  scorerPicks.filter(p=>p.player_name).forEach(p=>{counts[p.player_name]=(counts[p.player_name]||0)+1;});
  const total=scorerPicks.filter(p=>p.player_name).length;
  const sorted=Object.entries(counts).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]);
  if(!sorted.length){document.getElementById('scorer-summary').innerHTML='<div class="empty">まだ誰も予想していません</div>';return;}
  document.getElementById('scorer-summary').innerHTML=sorted.map(([name,c])=>{const s=TOP_SCORERS.find(x=>x.name===name);const pct=Math.round(c/Math.max(total,1)*100);return`<div class="odds-item"><div style="flex:1"><div class="odds-team">${s?.flag||''} ${name}</div><div style="font-size:11px;color:var(--text3)">${c}票 (${pct}%)</div><div class="odds-bar"><div class="odds-fill" style="width:${pct}%"></div></div></div></div>`;}).join('');
}
async function setScorerPick(player,team){
  if(!currentUser)return;
  const ex=scorerPicks.find(p=>p.user_id===currentUser.id);
  if(ex?.player_name===player){
    await sb.from('top_scorer_picks').update({player_name:'',team_name:''}).eq('user_id',currentUser.id);
    await loadScorerPicks();renderScorer();showToast('得点王予想を解除しました');return;
  }
  if(ex)await sb.from('top_scorer_picks').update({player_name:player,team_name:team}).eq('user_id',currentUser.id);
  else await sb.from('top_scorer_picks').insert({user_id:currentUser.id,player_name:player,team_name:team});
  await loadScorerPicks();renderScorer();showToast(`${player} を得点王予想に設定しました`);
}

// ODDS
function renderOdds(){
  const counts={};const allTeams=Object.values(GROUPS).flat();allTeams.forEach(t=>counts[t]=0);
  champPicks.forEach(c=>{if(c.team_name)counts[c.team_name]=(counts[c.team_name]||0)+1;});
  const total=champPicks.length;
  const sorted=allTeams.filter(t=>BASE_ODDS[t]).map(t=>{let odds=BASE_ODDS[t]||99;if(total>2&&counts[t]>0)odds=Math.max(1.5,odds*(1-counts[t]/total*0.5));return{t,odds};}).sort((a,b)=>a.odds-b.odds).slice(0,16);
  document.getElementById('odds-list').innerHTML=sorted.map(({t,odds})=>`<div class="odds-item"><div class="odds-team">${FLAGS[t]||''} ${t}</div><div class="odds-val">${odds.toFixed(1)}倍</div></div>`).join('');
  renderOddsGroupTabs();renderOddsMatches();
}
function renderOddsGroupTabs(){document.getElementById('odds-group-tabs').innerHTML=Object.keys(GROUPS).map(g=>`<button class="gtab${g===oddsGroup?' active':''}" onclick="setOddsGroup('${g}')">${g}</button>`).join('');}
function setOddsGroup(g){oddsGroup=g;renderOddsGroupTabs();renderOddsMatches();}
function renderOddsMatches(){
  const matches=ALL_MATCHES.filter(m=>m.group===oddsGroup);
  if(!allProfiles.length){document.getElementById('odds-matches').innerHTML='<div class="empty">参加者が予想すると表示されます</div>';return;}
  document.getElementById('odds-matches').innerHTML=matches.map(m=>{
    const preds=allPredictions.filter(p=>p.match_id===m.id);
    const w=preds.filter(p=>p.result==='W').length,d=preds.filter(p=>p.result==='D').length,l=preds.filter(p=>p.result==='L').length,tot=w+d+l;
    if(!tot)return`<div class="match-row"><div style="font-size:12px;color:var(--text3)">${FLAGS[m.home]||''} ${m.home} vs ${FLAGS[m.away]||''} ${m.away} — 予想なし</div></div>`;
    return`<div class="match-row"><div style="font-size:13px;font-weight:600;margin-bottom:4px">${FLAGS[m.home]||''} ${m.home} vs ${FLAGS[m.away]||''} ${m.away}</div><div style="display:flex;gap:6px;font-size:11px;color:var(--text3);margin-bottom:5px">${w}票 / ${d}票 / ${l}票</div><div style="display:flex;gap:5px"><span class="badge badge-green">H ${(tot/Math.max(w,.5)).toFixed(1)}倍</span><span class="badge badge-amber">引 ${(tot/Math.max(d,.5)).toFixed(1)}倍</span><span class="badge badge-red">A ${(tot/Math.max(l,.5)).toFixed(1)}倍</span></div></div>`;
  }).join('');
}

// RANKING
function renderRanking(){
  const scores=allProfiles.map((p,i)=>{
    const preds=allPredictions.filter(pr=>pr.user_id===p.id);
    let pts=0;preds.forEach(pr=>{const r=allResults[pr.match_id];if(r?.result&&r.result===pr.result)pts+=3;});
    const cp=champPicks.find(c=>c.user_id===p.id);const sp=scorerPicks.find(c=>c.user_id===p.id);
    const totalPreds=preds.length,pct=Math.round(totalPreds/72*100),col=AVATARS[i%AVATARS.length];
    return{name:p.display_name,pts,preds:totalPreds,pct,col,isAdmin:p.is_admin,champ:cp?.team_name||'',scorer:sp?.player_name||''};
  }).sort((a,b)=>b.pts-a.pts||b.preds-a.preds);
  if(!scores.length){document.getElementById('ranking-list').innerHTML='<div class="empty">まだ誰も登録していません</div>';return;}
  document.getElementById('ranking-list').innerHTML=scores.map((u,i)=>`<div class="rank-row"><div class="rank-num">${['🥇','🥈','🥉'][i]||i+1}</div><div class="rank-avatar" style="background:${u.col}33;color:${u.col}">${u.name.slice(0,2)}</div><div class="rank-info"><div class="rank-name">${u.name}${u.isAdmin?' 👑':''}</div><div class="rank-sub">${FLAGS[u.champ]||''} ${u.champ||'優勝未予想'} | ⚽${u.scorer||'得点王未予想'}</div><div class="progress-bar"><div class="progress-fill" style="width:${u.pct}%;background:${u.col}"></div></div></div><div class="rank-pts">${u.pts}pt</div></div>`).join('');
  if(currentProfile?.is_admin)renderResultSection();
}
function renderResultSection(){
  document.getElementById('result-group-tabs').innerHTML=Object.keys(GROUPS).map(g=>`<button class="gtab${g===resultGroup?' active':''}" onclick="setResultGroup('${g}')">${g}</button>`).join('');
  renderResultMatches();
}
function setResultGroup(g){resultGroup=g;renderResultSection();}
function renderResultMatches(){
  const matches=ALL_MATCHES.filter(m=>m.group===resultGroup);
  document.getElementById('result-match-list').innerHTML=matches.map(m=>{
    const rData=allResults[m.id],r=rData?.result||'',hs=rData?.home_score??'',as=rData?.away_score??'';
    const hf=FLAGS[m.home]||'',af=FLAGS[m.away]||'';
    return`<div class="match-row"><div style="font-size:12px;font-weight:600;margin-bottom:6px;color:var(--text2)">${hf} ${m.home} vs ${af} ${m.away}</div><div class="result-btns"><button class="result-btn${r==='W'?' sel-w':''}" onclick="setResult('${m.id}','W')">${hf} 勝ち</button><button class="result-btn${r==='D'?' sel-d':''}" onclick="setResult('${m.id}','D')">🤝 引分</button><button class="result-btn${r==='L'?' sel-l':''}" onclick="setResult('${m.id}','L')">${af} 勝ち</button></div><div class="score-input-row"><span style="font-size:11px;color:var(--text3);min-width:20px">${hf}</span><input class="score-input" type="number" min="0" max="20" value="${hs}" id="hs_${m.id}" placeholder="0"><span class="score-dash">-</span><input class="score-input" type="number" min="0" max="20" value="${as}" id="as_${m.id}" placeholder="0"><span style="font-size:11px;color:var(--text3);min-width:20px;text-align:right">${af}</span><button class="score-save-btn" onclick="saveScore('${m.id}','${m.home}','${m.away}')">保存</button></div></div>`;
  }).join('');
}
async function setResult(matchId,result){
  if(!currentProfile?.is_admin)return;const rData=allResults[matchId];const prev=rData?.result;
  if(prev===result){delete allResults[matchId];await sb.from('match_results').delete().eq('match_id',matchId);renderResultMatches();renderRanking();renderMatchList();showToast('結果を解除しました');return;}
  const hs=parseInt(document.getElementById(`hs_${matchId}`)?.value)||null;const as=parseInt(document.getElementById(`as_${matchId}`)?.value)||null;
  allResults[matchId]={result,home_score:hs,away_score:as};
  if(rData)await sb.from('match_results').update({result,home_score:hs,away_score:as}).eq('match_id',matchId);
  else await sb.from('match_results').insert({match_id:matchId,result,home_score:hs,away_score:as,entered_by:currentUser.id});
  renderResultMatches();renderRanking();renderMatchList();showToast('結果を記録しました ✓');
}
async function saveScore(matchId,home,away){
  if(!currentProfile?.is_admin)return;
  const hs=parseInt(document.getElementById(`hs_${matchId}`)?.value);const as=parseInt(document.getElementById(`as_${matchId}`)?.value);
  if(isNaN(hs)||isNaN(as)){showToast('スコアを入力してください');return;}
  const result=hs>as?'W':hs<as?'L':'D';
  allResults[matchId]={result,home_score:hs,away_score:as};
  const ex=await sb.from('match_results').select('match_id').eq('match_id',matchId).single();
  if(ex.data)await sb.from('match_results').update({result,home_score:hs,away_score:as}).eq('match_id',matchId);
  else await sb.from('match_results').insert({match_id:matchId,result,home_score:hs,away_score:as,entered_by:currentUser.id});
  renderResultMatches();renderRanking();renderMatchList();showToast(`${FLAGS[home]||''} ${hs} - ${as} ${FLAGS[away]||''} 保存しました`);
}

// NAVIGATION
const SECTIONS=['schedule','predict','odds','ranking'];
let currentSectionIdx=0;
function showSection(name,btn){
  const idx=SECTIONS.indexOf(name);if(idx===-1)return;currentSectionIdx=idx;
  document.getElementById('content-slider').style.transform=`translateX(-${idx*100}vw)`;
  document.querySelectorAll('.nav-item').forEach((b,i)=>b.classList.toggle('active',i===idx));
  if(name==='predict'){renderChampion();}
  if(name==='odds')renderOdds();
  if(name==='ranking')renderRanking();
}
function initSwipe(){
  const s=document.getElementById('content-slider');if(!s||s._si)return;s._si=true;let sx=0,sy=0;
  s.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY;},{passive:true});
  s.addEventListener('touchend',e=>{
    const dx=e.changedTouches[0].clientX-sx,dy=e.changedTouches[0].clientY-sy;
    if(Math.abs(dx)<Math.abs(dy)||Math.abs(dx)<50)return;
    if(dx<0&&currentSectionIdx<SECTIONS.length-1)showSection(SECTIONS[currentSectionIdx+1],document.querySelectorAll('.nav-item')[currentSectionIdx+1]);
    else if(dx>0&&currentSectionIdx>0)showSection(SECTIONS[currentSectionIdx-1],document.querySelectorAll('.nav-item')[currentSectionIdx-1]);
  },{passive:true});
}
function openMenu(){document.getElementById('menu-overlay').classList.add('show');}
function closeMenu(e){if(e.target===document.getElementById('menu-overlay'))document.getElementById('menu-overlay').classList.remove('show');}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}

// ページが前面に戻った時に最新データを再取得
document.addEventListener('visibilitychange',async()=>{
  if(document.visibilityState==='visible'&&currentUser){
    await loadMyPredictions();
    renderMatchList();
  }
});
</script>
